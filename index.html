<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ListShare</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#10b981" />
  <meta property="og:title" content="ListShare" />
  <meta property="og:description" content="Ultimate shared shopping list experience." />
  <meta property="og:image" content="og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="og-image.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-startup-image" href="splash-icon.png" />
  
  <script>
    // Critical: Listen for chunk loading errors and force refresh
    window.addEventListener('error', function(e) {
      if (e.message && (e.message.indexOf('chunk') > -1 || e.message.indexOf('Loading chunk') > -1)) {
        console.error('Critical: Chunk load error detected. Attempting recovery...');
        if (!window.location.search.includes('v=')) {
          // Perform soft reset (clear cache + SW only, keep localStorage)
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) caches.delete(name);
            });
          }
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (let reg of regs) reg.unregister();
            });
          }
          window.location.href = window.location.origin + window.location.pathname + '?v=' + Date.now();
        }
      }
    }, true);
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
